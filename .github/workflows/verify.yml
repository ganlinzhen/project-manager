name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
